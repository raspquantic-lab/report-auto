<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>준공서류 자동 생성기</title><link rel="stylesheet" href="style.css?v=3.2"></head><body>
<main class="app"><header class="hero"><div><p class="eyebrow">CODE-GENERATED XLSX</p><h1>준공서류 자동 생성기</h1><p>원본 엑셀 없이 코드만으로 준공 및 안전·보건 서류 9종을 선택 생성합니다.</p></div><span class="version">v3.2</span></header><form id="form">
<section class="card"><div class="section-title"><span>01</span><h2>공사 정보</h2></div><div class="grid">
<label class="wide">공사명<input id="projectName" placeholder="미입력 가능"></label><label>시공사명<input id="companyName"></label><label>시공부대<input id="constructionUnit" value="제5공중기동비행단"></label><label>부대장<input id="commander" value="제5공중기동비행단장"></label><label>위치<input id="location" value="K-1"></label><label>도급액<input id="contractAmount" inputmode="numeric"></label><label>변경 도급액<input id="changedAmount" inputmode="numeric"></label><label>준공금액<input id="completionAmount" inputmode="numeric"></label><label>지급재료비<input id="materialAmount" inputmode="numeric" value="0"></label><label>계약일<input id="contractDate" type="date"></label><label>실착공일<input id="actualStartDate" type="date"></label><label>준공일<input id="completionDate" type="date"></label><label>실준공일<input id="actualCompletionDate" type="date"></label><label>준공검사일<input id="inspectionDate" type="date"></label><label>입찰일<input id="bidDate" type="date"></label><label>연기일 <small>미입력 시 공란 날짜 형식</small><input id="extensionDate" type="date"></label><label>인가일<input id="approvalDate" type="date"></label><label>인가번호<input id="approvalNumber"></label></div></section>
<section class="card"><div class="section-title"><span>02</span><h2>담당자</h2></div><div class="person-grid">
<fieldset><legend>설계담당관</legend><label>직책<input id="designerPosition"></label><label>이름<input id="designerName"></label></fieldset><fieldset><legend>공사감독관</legend><label>계급<input id="supervisorRank"></label><label>이름<input id="supervisorName"></label></fieldset><fieldset><legend>시공자</legend><label>직책<input id="constructorPosition"></label><label>이름<input id="constructorName"></label></fieldset><fieldset><legend>준공검사관</legend><label>계급<input id="inspectorRank"></label><label>이름<input id="inspectorName"></label></fieldset>
<fieldset class="wide"><legend>입회관</legend><label>소속<input id="attendeeAffiliation"></label><label>직책<input id="attendeePosition"></label><label>계급<input id="attendeeRank"></label><label>이름<input id="attendeeName"></label></fieldset></div></section>
<section class="card"><div class="section-title"><span>03</span><h2>공사개요</h2><button type="button" id="addOverview" class="small-btn">＋ 항목 추가</button></div><div id="overviewList" class="overview-list"></div></section>
<section class="card"><div class="section-title"><span>04</span><h2>검사 및 의견</h2></div><div class="grid"><label class="wide">검사사항<textarea id="inspectionItem" rows="3">ㅇ 양  호</textarea></label><label class="wide">검사관 개평<textarea id="inspectorComment" rows="3"></textarea></label><label class="wide">입회관 의견<textarea id="attendeeOpinion" rows="3"></textarea></label><label class="wide">시공부대 의견<textarea id="unitOpinion" rows="3"></textarea></label><label class="wide">받는이<input id="recipient" value="공군 제5공중기동비행단 재무관 귀하"></label></div></section>
<section class="card"><div class="section-title"><span>05</span><h2>안전·보건 서류 정보</h2></div><div class="grid"><label>회의장소<input id="meetingPlace" value="기술관리실 회의실"></label><label>대대장 이름<input id="battalionCommanderName" placeholder="위험성 평가표 M7"></label><label class="wide">교육내용<input id="educationContent" value="안전 교육 및 안전위해요소 확인 등"></label></div></section>
<section class="card"><div class="section-title"><span>06</span><h2>공사인부</h2><button type="button" id="addWorker" class="small-btn">＋ 인부 추가</button></div><div id="workerList" class="worker-list"></div><p class="note">회사명은 공사 정보의 시공사명을 공통으로 사용합니다.</p></section>
<section class="card"><div class="section-title"><span>07</span><h2>생성할 서류</h2></div><div class="checks"><label><input type="checkbox" id="includeRecord" checked> 준공검사조서</label><label><input type="checkbox" id="includeResult" checked> 준공검사 결과보고서</label><label><input type="checkbox" id="includeSupervisorReport" checked> 용역감독관 준공 감독조서</label><label><input type="checkbox" id="includeAttendeeOpinion" checked> 입회관 의견서</label><label><input type="checkbox" id="includeCompletionReport" checked> 용역 완결 보고서</label><label><input type="checkbox" id="includeSafetyPledge" checked> 안전 보건 이행 확약서</label><label><input type="checkbox" id="includeSafetyCouncil" checked> 안전 보건 협의체 운영내용</label><label><input type="checkbox" id="includeSafetyEducation" checked> 안전교육 및 작업장 점검 결과</label><label><input type="checkbox" id="includeRiskAssessment" checked> 위험성 평가표</label></div><p class="note">평가점수 표와 양식의 고정 문구는 원본 그대로 유지합니다.</p></section>
<div class="actions"><p id="status"></p><button type="button" id="sampleBtn" class="secondary">예시값</button><button type="reset" class="ghost">초기화</button><button type="submit" class="primary">Excel 생성</button></div></form></main><script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script><script src="workbook-schema.js?v=3.2"></script><script src="app.js?v=3.2"></script></body></html>
